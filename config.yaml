paths:
  # LLM-generated prompts (JSON).
  llm_json: /vol/lian/Gen_AI/LLM.json

classification:
  celeba:
    # CelebA attribute annotation CSV.
    attr_csv: /vol/lian/datasets/celeba/list_attr_celeba.csv
    # CelebA evaluation partition CSV.
    split_csv: /vol/lian/datasets/celeba/list_eval_partition.csv
    # Directory containing CelebA image files.
    img_dir: /vol/lian/datasets/celeba/img_align_celeba
  facet:
    # FACET single-person annotation CSV.
    annotation_csv: /vol/lian/Gen_AI/FACET/single_person.csv
    # Directory containing FACET single-person image files.
    img_dir: /vol/lian/Gen_AI/FACET/single_person

retrieval:
  datasets:
    coco:
      # COCO image-caption pairs CSV used as retrieval queries and ground truth.
      pairs_csv: /vol/lian/Gen_AI/COCO2017_image_caption_pairs.csv
      # Root directory containing COCO images.
      images_root: /vol/lian/Gen_AI/COCO2017_inference
      # COCO sensitive-group annotation CSV used for fairness grouping.
      group_csv: /vol/lian/Gen_AI/COCO2017.csv
    flickr:
      # Flickr30k image-caption pairs CSV used as retrieval queries and ground truth.
      pairs_csv: /vol/lian/Gen_AI/flickr30k/flicker_single.csv
      # Directory containing Flickr30k images used for retrieval.
      images_root: /vol/lian/Gen_AI/flickr30k/single_flicker
